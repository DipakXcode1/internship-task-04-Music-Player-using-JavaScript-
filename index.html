<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="music-player">
            <div class="album-art">
                <div class="vinyl">
                    <div class="vinyl-center"></div>
                </div>
            </div>
            
            <div class="song-info">
                <h2 class="song-title">Select a song</h2>
                <p class="artist">Artist</p>
            </div>
            
            <div class="progress-container">
                <div class="time-display">
                    <span class="current-time">0:00</span>
                    <span class="duration">0:00</span>
                </div>
                <input type="range" class="progress-bar" min="0" max="100" value="0">
            </div>
            
            <div class="controls">
                <button class="control-btn prev-btn" title="Previous">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                    </svg>
                </button>
                <button class="control-btn play-btn" title="Play">
                    <svg class="play-icon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg class="pause-icon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>
                <button class="control-btn next-btn" title="Next">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                    </svg>
                </button>
            </div>
            
            <div class="volume-container">
                <svg class="volume-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
                <input type="range" class="volume-slider" min="0" max="100" value="80">
            </div>
            
            <div class="autoplay-toggle">
                <label class="switch">
                    <input type="checkbox" class="autoplay-checkbox" checked>
                    <span class="slider"></span>
                </label>
                <span>Autoplay</span>
            </div>
        </div>
        
        <div class="playlist">
            <h3>Playlist</h3>
            <ul class="playlist-items"></ul>
        </div>
    </div>
    
    <audio id="audio"></audio>
    <script src="script.js"></script>
</body>
</html>
